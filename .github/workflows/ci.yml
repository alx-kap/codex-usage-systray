name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          cd claude-usage-systray
          xcodebuild test \
            -project ClaudeUsageSystray.xcodeproj \
            -scheme ClaudeUsageSystrayTests \
            -destination 'platform=macOS' \
            | grep -E "(Test Case|passed|failed|SUCCEEDED|FAILED)"
