name: ChatGPTCodexUsageTray
options:
  bundleIdPrefix: com.chatgpt
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  CodexUsageSystray:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chatgpt.codex-usage-tray
        PRODUCT_NAME: CodexUsageSystray
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        LSUIElement: YES
    dependencies:
      - sdk: Security.framework
    entitlements:
      path: Resources/CodexUsageSystray.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  CodexUsageSystrayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: CodexUsageSystray
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chatgpt.codex-usage-tray-tests
        GENERATE_INFOPLIST_FILE: YES
